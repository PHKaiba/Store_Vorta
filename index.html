<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('img/fundo.jpg') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
        }
        
        .logo {
            width: 300px;
            height: 300px;
            background: url('img/logo.png') center/contain no-repeat;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.8));
            animation: slideInLogo 1s ease-out;
        }
        
        .frase {
            font-size: 16px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 300;
            line-height: 1.8;
            animation: slideInFrase 1.5s ease-out;
        }
        
        @keyframes slideInLogo {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideInFrase {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .logo {
                width: 200px;
                height: 200px;
                margin-bottom: 30px;
            }
            .frase {
                font-size: 14px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo"></div>
        <div class="frase">
            O CAOS ESTÁ CHEGANDO
        </div>
    </div>
</body>

</html>
