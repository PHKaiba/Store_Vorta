<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTA Sahra - Bem-vindo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Bebas Neue', sans-serif;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
        }
        
        .texto {
            font-size: 48px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 8px;
            line-height: 1.6;
            max-width: 800px;
            animation: fadeIn 1.2s ease-out;
            font-weight: 700;
        }
        
        .texto p {
            margin: 30px 0;
        }
        
        .drop {
            font-size: 72px;
            color: #fff;
            font-weight: 700;
            margin: 60px 0;
            letter-spacing: 6px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .em-breve {
            font-size: 20px;
            color: #888;
            margin-top: 80px;
            letter-spacing: 4px;
            animation: blink 3s ease-in-out infinite;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }
        
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        
        @media (max-width: 768px) {
            .texto {
                font-size: 32px;
                letter-spacing: 4px;
                line-height: 1.4;
            }
            .drop {
                font-size: 48px;
                letter-spacing: 3px;
            }
            .em-breve {
                font-size: 14px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="texto">
            <p>Bem-vindo.</p>
            <p>Você faz parte da VORTA.</p>
            <div class="drop">DROP 002</div>
            <p>EM BREVE.</p>
        </div>

        <div class="em-breve">something is coming</div>
    </div>
</body>

</html>
